<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Sandbox 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* ==========================================================================
           1. CSS VARIABLES (THEMES)
           ========================================================================== */
        :root {
            --login-bg: #a8e6cf;
            --dash-bg: #e4f4ff;
            --bubble-color: rgba(162, 217, 255, 0.4);
            
            --text-dark: #2c3e50;
            --text-light: #ffffff;
            --text-muted: #64748b;
            
            /* Dynamic Theme Variables */
            --theme-top: #c084fc;
            --theme-bot: #9333ea;
            
            /* Fixed Colors */
            --btn-google-top: #ffffff;
            --btn-google-bot: #dcdcdc;
            --btn-orange-top: #ff9f69;
            --btn-orange-bot: #eb7a3d;
            --btn-green-top: #a7e05f;
            --btn-green-bot: #81bd35;
            --btn-red-top: #ff6b6b;
            --btn-red-bot: #ee5253;
            
            /* Cards */
            --card-sandbox-top: #ffffff;
            --card-sandbox-bot: #e2e8f0;
            --card-white-top: #ffffff;
            --card-white-bot: #e2e8f0;
            
            /* Settings */
            --toggle-bg-off: #cbd5e1;
            --toggle-bg-on: var(--theme-top);
        }

        .dark-mode {
            --login-bg: #0f172a;
            --dash-bg: #1e293b;
            --bubble-color: rgba(15, 23, 42, 0.8);
            --text-dark: #f8fafc;
            --text-muted: #94a3b8;
            
            --btn-google-top: #334155;
            --btn-google-bot: #1e293b;
            
            --card-sandbox-top: #334155;
            --card-sandbox-bot: #0f172a;
            --card-white-top: #334155;
            --card-white-bot: #0f172a;
            --toggle-bg-off: #475569;
        }

        /* ==========================================================================
           2. GLOBAL STYLES & ANIMATIONS
           ========================================================================== */
        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--login-bg); transition: background-color 0.5s ease; color: var(--text-dark); }
        
        .bg-bubbles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden; }
        .bubble { position: absolute; border-radius: 50%; background-color: var(--bubble-color); animation: floatUp 15s infinite linear; opacity: 0; }
        .bubble:nth-child(1) { width: 150px; height: 150px; left: -20px; bottom: -150px; animation-duration: 25s; }
        .bubble:nth-child(2) { width: 80px; height: 80px; left: 80%; bottom: -80px; animation-duration: 18s; animation-delay: 2s; }
        .bubble:nth-child(3) { width: 250px; height: 250px; left: 40%; bottom: -250px; animation-duration: 30s; animation-delay: 5s; }
        
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-120vh) scale(1.2); opacity: 0; } }

        .app-wrapper { position: relative; z-index: 10; width: 100%; max-width: 480px; height: 100%; margin: 0 auto; display: flex; flex-direction: column; }
        .view { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; padding: 30px 20px; animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; overflow-y: auto; overflow-x: hidden;}
        .view.active { display: flex; }

        @keyframes slideIn { 0% { opacity: 0; transform: translateY(30px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes shine { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }

        /* ==========================================================================
           3. 3D UI COMPONENTS
           ========================================================================== */
        .title-3d { font-size: 46px; font-weight: 900; color: white; text-align: center; text-shadow: 0 4px 0px rgba(0,0,0,0.1), 0 8px 15px rgba(0,0,0,0.1); margin-bottom: 50px; line-height: 1.2; margin-top: 20vh;}
        .dark-mode .title-3d { color: var(--text-dark); text-shadow: none; }

        .btn-3d { position: relative; width: 100%; padding: 18px 25px; border-radius: 25px; border: none; font-size: 20px; font-weight: 900; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 12px; transition: transform 0.1s, border-bottom-width 0.1s, margin-bottom 0.1s; overflow: hidden; color: var(--text-light); user-select: none; }
        .btn-3d::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%); transform: skewX(-25deg); animation: shine 4s infinite; }
        .btn-3d:active { transform: translateY(6px); border-bottom-width: 0px !important; margin-bottom: 6px; }
        .btn-3d:disabled { filter: grayscale(1); cursor: not-allowed; transform: none; border-bottom-width: initial !important; margin-bottom: 0; }
        .btn-3d.icon-only { width: 60px; height: 60px; padding: 0; border-radius: 20px; }

        .btn-google { background-color: var(--btn-google-top); color: #2b7af0; border: 4px solid #3a9dec; border-bottom: 10px solid #3a9dec; border-radius: 35px; font-size: 22px; padding: 20px; }
        .dark-mode .btn-google { border-color: #475569; color: white;}
        .btn-guest { background-color: transparent; color: var(--text-dark); border: none; font-size: 18px; font-weight: 800; margin-top: 30px; cursor: pointer; text-decoration: underline; opacity: 0.8; }
        
        .btn-theme { background-color: var(--theme-top); border-bottom: 8px solid var(--theme-bot); }
        .btn-orange { background-color: var(--btn-orange-top); border-bottom: 8px solid var(--btn-orange-bot); }

        .card-3d { width: 100%; background-color: var(--card-white-top); border-radius: 30px; padding: 25px; border-bottom: 8px solid var(--card-white-bot); box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; transition: background-color 0.3s, border-color 0.3s; }
        .card-sandbox { background-color: var(--card-sandbox-top); border-bottom: 8px solid var(--card-sandbox-bot); padding: 10px; border-radius: 25px;}

        /* ==========================================================================
           4. SPECIFIC UI ELEMENTS
           ========================================================================== */
        /* Top Bar & Profile */
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 25px; }
        .timer-badge { background-color: var(--btn-orange-top); color: white; font-size: 26px; font-weight: 900; padding: 10px 25px; border-radius: 20px; border-bottom: 6px solid var(--btn-orange-bot); display: flex; align-items: center; justify-content: center; letter-spacing: 2px;}
        
        .profile-container { position: relative; }
        .profile-avatar { width: 60px; height: 60px; border-radius: 20px; border-bottom: 6px solid var(--card-white-bot); background-color: var(--card-white-top); cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: transform 0.1s; }
        .profile-avatar:active { transform: translateY(4px); border-bottom-width: 2px; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-dropdown { position: absolute; top: 70px; right: 0; background: var(--card-white-top); border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 10px; display: none; flex-direction: column; gap: 5px; min-width: 150px; z-index: 100; border: 2px solid var(--card-white-bot); }
        .profile-dropdown.show { display: flex; animation: popIn 0.2s ease-out forwards; }
        .dropdown-item { padding: 12px 15px; border-radius: 10px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--text-dark); transition: background 0.2s; }
        .dropdown-item:hover { background: var(--card-white-bot); }
        .dropdown-item.logout { color: var(--btn-red-top); }

        /* Actions Bar */
        .actions-bar { display: flex; gap: 15px; width: 100%; margin-bottom: 25px; }
        .actions-bar .btn-3d { margin-bottom: 0; }

        /* Sandbox Workspace */
        .email-input-wrapper { background: var(--dash-bg); padding: 20px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; gap: 10px;}
        .email-input { width: 100%; border: none; background: transparent; font-size: 18px; font-weight: 800; color: var(--text-dark); outline: none; }
        .icon-btn { background: transparent; border: none; cursor: pointer; color: var(--text-muted); padding: 5px; display: flex; transition: 0.2s; }
        .icon-btn:hover { color: var(--theme-top); transform: scale(1.1); }

        /* Skeleton Loading Always (Replaced Empty State) */
        .skeleton { background: var(--card-white-bot); background-image: linear-gradient(90deg, var(--card-white-bot) 0px, var(--card-white-top) 40px, var(--card-white-bot) 80px); background-size: 200vw 100%; animation: shimmer 1.5s infinite linear; border-radius: 10px; }
        @keyframes shimmer { 100% { background-position: -200vw 0; } }
        
        .skeleton-card { background: var(--card-white-top); border-radius: 20px; padding: 20px; margin-bottom: 15px; border-left: 6px solid var(--theme-top); box-shadow: 0 5px 15px rgba(0,0,0,0.05);}
        .skeleton-line { height: 15px; margin-bottom: 12px; width: 40%; }
        .skeleton-line.full { width: 100%; height: 35px; margin-top: 15px;}

        /* Email Accordion */
        .message-item { background: var(--card-white-top); border-radius: 20px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-left: 6px solid var(--theme-top); overflow: hidden; animation: slideIn 0.3s forwards; }
        .msg-header { padding: 15px 20px; cursor: pointer; display: flex; flex-direction: column; gap: 5px; position: relative; }
        .msg-top-row { display: flex; justify-content: space-between; align-items: center; }
        .msg-sender { font-size: 14px; color: var(--text-muted); font-weight: 800; }
        .msg-time { font-size: 12px; color: var(--text-muted); font-weight: 700; background: var(--dash-bg); padding: 4px 10px; border-radius: 12px;}
        .msg-subject-row { display: flex; justify-content: space-between; align-items: center; margin-top: 5px;}
        .msg-subject { font-size: 18px; font-weight: 900; color: var(--text-dark); padding-right: 20px;}
        .msg-arrow { width: 20px; height: 20px; fill: var(--text-muted); transition: transform 0.3s ease; }
        .message-item.open .msg-arrow { transform: rotate(180deg); }
        
        .msg-body { background: var(--dash-bg); padding: 20px; font-size: 16px; color: var(--text-dark); display: none; border-top: 1px solid rgba(0,0,0,0.05); word-wrap: break-word; overflow-x: auto;}
        .message-item.open .msg-body { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Settings View */
        .settings-header { display: flex; align-items: center; width: 100%; margin-bottom: 40px; }
        .back-btn { width: 50px; height: 50px; background-color: var(--card-white-top); border-radius: 15px; border-bottom: 6px solid var(--card-white-bot); display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--theme-top); transition: 0.1s;}
        .back-btn:active { transform: translateY(4px); border-bottom-width: 2px; }
        .settings-title { flex: 1; text-align: center; font-size: 24px; font-weight: 900; padding-right: 50px;}

        .setting-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 15px;}
        .setting-info { font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 10px;}
        
        .toggle-3d { width: 70px; height: 35px; background-color: var(--toggle-bg-off); border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
        .toggle-3d.active { background-color: var(--toggle-bg-on); }
        .toggle-knob { width: 27px; height: 27px; background-color: white; border-radius: 50%; position: absolute; left: 4px; top: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.3s; display: flex; justify-content: center; align-items: center;}
        .toggle-3d.active .toggle-knob { left: 39px; }

        /* 3D Theme Squares (Duolingo Style) */
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 15px; }
        .color-square { 
            width: 100%; aspect-ratio: 1; border-radius: 15px; cursor: pointer; 
            transition: transform 0.1s, border-bottom-width 0.1s, filter 0.2s; 
            position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        .color-square:active { transform: translateY(4px); border-bottom-width: 2px !important; margin-bottom: 4px; }
        .color-square.active::after {
            content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 24px; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* ==========================================================================
           5. ZERO THREAT BUBBLE OVERLAY
           ========================================================================== */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 9999; opacity: 0; transition: opacity 0.3s; }
        .overlay.show { display: flex; opacity: 1; }
        
        .bubble-showcase { position: relative; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; align-items: center; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .tooltip-speech { background: white; color: var(--theme-top); padding: 10px 20px; border-radius: 20px; font-size: 18px; font-weight: 900; position: absolute; top: -40px; right: -20px; transform: rotate(8deg); border: 3px solid var(--theme-top); z-index: 2; animation: floatUpTooltip 2s infinite alternate ease-in-out;}
        .tooltip-speech::after { content: ''; position: absolute; bottom: -10px; left: 15px; border-width: 10px 10px 0; border-style: solid; border-color: var(--theme-top) transparent transparent transparent; }
        @keyframes floatUpTooltip { 0% { transform: rotate(8deg) translateY(0); } 100% { transform: rotate(12deg) translateY(-5px); } }

        .magic-bubble { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ffffff, var(--theme-top), var(--theme-bot)); box-shadow: 0 20px 40px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center; color: white; font-size: 38px; font-weight: 900; text-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 4px solid rgba(255,255,255,0.8); letter-spacing: 2px; position: relative;}
        
        .btn-close-bubble { position: absolute; top: -15px; left: -15px; width: 40px; height: 40px; background: var(--btn-red-top); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; border: 3px solid white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 5; }

    </style>
</head>
<body>

    <div class="bg-bubbles">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    </div>

    <div class="app-wrapper">

        <!-- ==========================================
             VIEW 1: LOGIN
             ========================================== -->
        <div id="view-login" class="view active">
            <h1 class="title-3d">Secure<br>Sandbox</h1>
            
            <div id="googleAuthWrapper" style="width: 100%; position:relative; min-height:80px; display:flex; justify-content:center;">
                <!-- الزر أصبح الآن زراً عادياً ينفذ دالة جافاسكريبت، مما يضمن عمل الأنميشن بشكل كامل -->
                <button class="btn-3d btn-google" id="fakeGoogleBtn" onclick="appLogic.loginWithGoogle()">
                    <svg width="24" height="24" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    Continue with Google
                </button>
            </div>

            <button class="btn-guest" onclick="appLogic.handleGuestLogin()">Continue as Guest ➔</button>
        </div>

        <!-- ==========================================
             VIEW 2: MAIN DASHBOARD
             ========================================== -->
        <div id="view-dashboard" class="view">
            <div class="top-bar">
                <div class="timer-badge" id="timerDisplay">20:00</div>
                
                <div class="profile-container">
                    <div class="profile-avatar" onclick="appLogic.toggleProfileMenu()">
                        <!-- تمت إضافة referrerpolicy لتجنب حظر عرض الصورة من روابط جوجل -->
                        <img id="userAvatar" referrerpolicy="no-referrer" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23cbd5e1'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>" alt="User">
                    </div>
                    <div class="profile-dropdown" id="profileMenu">
                        <div class="dropdown-item" onclick="appLogic.switchView('view-settings')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                            Settings
                        </div>
                        <div class="dropdown-item logout" onclick="appLogic.logout()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                            Logout
                        </div>
                    </div>
                </div>
            </div>

            <div class="actions-bar">
                <button class="btn-3d btn-theme" style="flex: 1;" onclick="mailLogic.generateMail()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    New Email
                </button>
                <button class="btn-3d btn-theme icon-only" onclick="mailLogic.manualRefresh()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                </button>
            </div>

            <div class="card-3d card-sandbox">
                <div class="email-input-wrapper">
                    <input type="text" id="emailInput" class="email-input" readonly value="Click 'New Email' to start">
                    <button class="icon-btn" onclick="mailLogic.copyEmail()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    </button>
                </div>
            </div>

            <div id="inboxContainer" style="width: 100%;">
                <div class="skeleton-card">
                    <div class="skeleton skeleton-line"></div>
                    <div class="skeleton skeleton-line" style="width:30%;"></div>
                    <div class="skeleton skeleton-line full"></div>
                </div>
            </div>
        </div>

        <!-- ==========================================
             VIEW 3: SETTINGS
             ========================================== -->
        <div id="view-settings" class="view">
            <div class="settings-header">
                <div class="back-btn" onclick="appLogic.switchView('view-dashboard')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
                </div>
                <div class="settings-title">App Settings</div>
            </div>

            <div class="card-3d">
                <div class="setting-row">
                    <div class="setting-info">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        Dark Mode
                    </div>
                    <div class="toggle-3d" id="toggleDarkMode" onclick="appLogic.toggleDarkMode()">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
            </div>

            <div class="card-3d">
                <div class="setting-row">
                    <div class="setting-info">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                        Zero Threat Auto-Copy
                    </div>
                    <div class="toggle-3d active" id="toggleZeroThreat" onclick="appLogic.toggleZeroThreat()">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <p style="font-size:14px; color:var(--text-muted); margin:0;">Auto-copies 6-8 digit security codes from incoming emails.</p>
            </div>

            <div class="card-3d">
                <h3 style="margin-top:0; color:var(--text-dark);">Theme Colors</h3>
                <div class="color-grid" id="colorGrid">
                </div>
            </div>
        </div>
    </div>

    <!-- ==========================================
         ZERO THREAT BUBBLE OVERLAY
         ========================================== -->
    <div class="overlay" id="zeroThreatOverlay">
        <div class="bubble-showcase">
            <button class="btn-close-bubble" onclick="appLogic.closeBubble()">×</button>
            <div class="tooltip-speech">Auto-copied!</div>
            <div class="magic-bubble" id="magicBubbleCode">------</div>
        </div>
    </div>

    <!-- ==========================================================================
         6. JAVASCRIPT LOGIC
         ========================================================================== -->
    <script>
        const GOOGLE_CLIENT_ID = "55266732024-f09j54m0agghthlsb3ngpa2co5pmgq1h.apps.googleusercontent.com";

        const themes =[
            { top: '#3b82f6', bot: '#1d4ed8' }, { top: '#c084fc', bot: '#9333ea' }, 
            { top: '#ec4899', bot: '#be185d' }, { top: '#f43f5e', bot: '#be123c' }, 
            { top: '#ef4444', bot: '#b91c1c' }, { top: '#f97316', bot: '#c2410c' }, 
            { top: '#eab308', bot: '#a16207' }, { top: '#84cc16', bot: '#4d7c0f' }, 
            { top: '#22c55e', bot: '#15803d' }, { top: '#10b981', bot: '#047857' }, 
            { top: '#14b8a6', bot: '#0f766e' }, { top: '#06b6d4', bot: '#0e7490' }, 
            { top: '#0ea5e9', bot: '#0369a1' }, { top: '#6366f1', bot: '#4338ca' }, 
            { top: '#64748b', bot: '#334155' }, { top: '#3f3f46', bot: '#18181b' }
        ];

        const skeletonHTML = `
            <div class="skeleton-card">
                <div class="skeleton skeleton-line"></div>
                <div class="skeleton skeleton-line" style="width:30%;"></div>
                <div class="skeleton skeleton-line full"></div>
            </div>
            <div class="skeleton-card" style="opacity: 0.6;">
                <div class="skeleton skeleton-line"></div>
                <div class="skeleton skeleton-line" style="width:40%;"></div>
            </div>
        `;

        // دوال الحماية الجديدة (XSS Protection Helpers)
        function escapeHTML(str) {
            return str ? str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])
            ) : '';
        }

        function sanitizeHTML(html) {
            if(!html) return "No content.";
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const badTags = doc.querySelectorAll('script, iframe, object, embed, applet, meta, form, link, style, base');
            badTags.forEach(el => el.remove());
            const allElements = doc.querySelectorAll('*');
            allElements.forEach(el => {
                for (let i = el.attributes.length - 1; i >= 0; i--) {
                    const attr = el.attributes[i];
                    if (attr.name.toLowerCase().startsWith('on') || 
                        (attr.value && attr.value.toLowerCase().includes('javascript:'))) {
                        el.removeAttribute(attr.name);
                    }
                }
            });
            return doc.body.innerHTML;
        }

        const appLogic = {
            state: {
                user: null, 
                isDark: false,
                isZeroThreatEnabled: true,
                currentTheme: 1,
                timerInterval: null,
                timeLeft: 1200
            },
            
            googleClient: null,

            init: function() {
                this.loadState();
                this.setupGoogleAuth();
                this.renderColorGrid();
                this.applyState();

                document.addEventListener('click', (e) => {
                    if(!e.target.closest('.profile-container')) {
                        document.getElementById('profileMenu').classList.remove('show');
                    }
                });
            },

            loadState: function() {
                const saved = localStorage.getItem('secureSandboxState');
                if(saved) {
                    this.state = { ...this.state, ...JSON.parse(saved) };
                }
            },

            saveState: function() {
                localStorage.setItem('secureSandboxState', JSON.stringify({
                    user: this.state.user,
                    isDark: this.state.isDark,
                    isZeroThreatEnabled: this.state.isZeroThreatEnabled,
                    currentTheme: this.state.currentTheme
                }));
            },

            applyState: function() {
                if(this.state.user) {
                    this.switchView('view-dashboard');
                    if(this.state.user.picture) {
                        document.getElementById('userAvatar').src = this.state.user.picture;
                    }
                } else {
                    this.switchView('view-login');
                }

                document.body.classList.toggle('dark-mode', this.state.isDark);
                document.getElementById('toggleDarkMode').classList.toggle('active', this.state.isDark);
                document.getElementById('toggleZeroThreat').classList.toggle('active', this.state.isZeroThreatEnabled);
                this.setTheme(this.state.currentTheme, false);
            },

            setupGoogleAuth: function() {
                const initGoogle = () => {
                    if (typeof google !== 'undefined' && GOOGLE_CLIENT_ID) {
                        this.googleClient = google.accounts.oauth2.initTokenClient({
                            client_id: GOOGLE_CLIENT_ID,
                            scope: 'https://www.googleapis.com/auth/userinfo.profile',
                            callback: this.handleGoogleSuccess.bind(this)
                        });
                    }
                };
                
                // تهيئة عميل جوجل عندما يتم تحميل السكربت الخاص به
                if (typeof google !== 'undefined') {
                    initGoogle();
                } else {
                    window.onload = initGoogle;
                }
            },

            loginWithGoogle: function() {
                // فتح نافذة المصادقة الموثوقة من جوجل عند النقر الفعلي
                if (this.googleClient) {
                    this.googleClient.requestAccessToken();
                } else {
                    alert("Google sign-in is still loading, please wait a moment.");
                }
            },

            handleGoogleSuccess: async function(tokenResponse) {
                if (tokenResponse && tokenResponse.access_token) {
                    try {
                        // جلب بيانات الحساب (الصورة والاسم) باستخدام التوكن
                        const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                            headers: { Authorization: `Bearer ${tokenResponse.access_token}` }
                        });
                        const userInfo = await res.json();
                        
                        if (userInfo) {
                            this.state.user = { 
                                name: userInfo.name || 'User', 
                                picture: userInfo.picture || null 
                            };
                            this.saveState();
                            this.applyState();
                        }
                    } catch(e) {
                        console.error("Error fetching user profile:", e);
                    }
                }
            },

            handleGuestLogin: function() {
                this.state.user = { name: 'Guest', picture: null };
                this.saveState();
                this.applyState();
            },

            logout: function() {
                this.state.user = null;
                mailLogic.token = ""; 
                mailLogic.stopAutoRefresh();
                document.getElementById('emailInput').value = "Click 'New Email' to start";
                clearInterval(this.state.timerInterval);
                document.getElementById('timerDisplay').innerText = "20:00";
                document.getElementById('inboxContainer').innerHTML = skeletonHTML;
                
                document.getElementById('userAvatar').src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23cbd5e1'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>";
                
                this.saveState();
                this.applyState();
            },

            switchView: function(viewId) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById(viewId).classList.add('active');
                
                if(viewId === 'view-login') document.body.style.backgroundColor = "var(--login-bg)";
                else document.body.style.backgroundColor = "var(--dash-bg)";
            },

            toggleProfileMenu: function() {
                document.getElementById('profileMenu').classList.toggle('show');
            },

            toggleDarkMode: function() {
                this.state.isDark = !this.state.isDark;
                this.saveState();
                this.applyState();
            },

            toggleZeroThreat: function() {
                this.state.isZeroThreatEnabled = !this.state.isZeroThreatEnabled;
                this.saveState();
                this.applyState(); 
            },

            renderColorGrid: function() {
                const grid = document.getElementById('colorGrid');
                grid.innerHTML = '';
                themes.forEach((t, index) => {
                    const swatch = document.createElement('div');
                    swatch.className = `color-square ${index === this.state.currentTheme ? 'active' : ''}`;
                    swatch.style.backgroundColor = t.top;
                    swatch.style.borderBottom = `6px solid ${t.bot}`;
                    swatch.onclick = () => this.setTheme(index, true);
                    grid.appendChild(swatch);
                });
            },

            setTheme: function(index, save = false) {
                this.state.currentTheme = index;
                const root = document.documentElement;
                root.style.setProperty('--theme-top', themes[index].top);
                root.style.setProperty('--theme-bot', themes[index].bot);
                
                document.querySelectorAll('.color-square').forEach((el, i) => {
                    el.classList.toggle('active', i === index);
                });

                if(save) this.saveState();
            },

            startTimer: function() {
                clearInterval(this.state.timerInterval);
                this.state.timeLeft = 1200;
                this.updateTimerUI();

                this.state.timerInterval = setInterval(() => {
                    this.state.timeLeft--;
                    this.updateTimerUI();
                    
                    if(this.state.timeLeft <= 0) {
                        clearInterval(this.state.timerInterval);
                        document.getElementById('emailInput').value = "Expired.";
                        mailLogic.token = "";
                        mailLogic.stopAutoRefresh();
                    }
                }, 1000);
            },

            updateTimerUI: function() {
                let m = Math.floor(this.state.timeLeft / 60).toString().padStart(2, '0');
                let s = (this.state.timeLeft % 60).toString().padStart(2, '0');
                document.getElementById('timerDisplay').innerText = `${m}:${s}`;
            },

            showBubbleCode: function(code) {
                document.getElementById('magicBubbleCode').innerText = code;
                document.getElementById('zeroThreatOverlay').classList.add('show');
            },

            closeBubble: function() {
                document.getElementById('zeroThreatOverlay').classList.remove('show');
            }
        };

        const mailLogic = {
            api: "https://api.mail.tm",
            address: "",
            password: "",
            token: "",
            readIds: new Set(),
            autoRefreshInterval: null,
            isFetching: false, // قفل الأمان لمنع تداخل الاستعلامات

            generateMail: async function() {
                const input = document.getElementById('emailInput');
                input.value = "Generating...";
                
                this.readIds.clear();
                this.stopAutoRefresh();
                document.getElementById('inboxContainer').innerHTML = skeletonHTML;

                try {
                    const domRes = await fetch(`${this.api}/domains`);
                    const domData = await domRes.json();
                    const domain = domData["hydra:member"][0].domain;

                    this.address = `us_${Math.random().toString(36).substring(2, 8)}@${domain}`;
                    this.password = Math.random().toString(36).slice(-10);

                    await fetch(`${this.api}/accounts`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ address: this.address, password: this.password })
                    });

                    const tokenRes = await fetch(`${this.api}/token`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ address: this.address, password: this.password })
                    });
                    
                    const tokenData = await tokenRes.json();
                    this.token = tokenData.token;
                    input.value = this.address;

                    appLogic.startTimer();
                    this.startAutoRefresh();

                } catch (error) {
                    input.value = "Error generating.";
                }
            },

            copyEmail: function() {
                const input = document.getElementById('emailInput');
                const textToCopy = input.value;
                if(!textToCopy.includes('@')) return; 
                
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(textToCopy).catch(err => {
                        try { this.fallbackCopyText(textToCopy); } catch(e){}
                    });
                } else {
                    try { this.fallbackCopyText(textToCopy); } catch(e){}
                }
            },

            fallbackCopyText: function(text) {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed"; 
                textArea.style.top = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                } catch (err) {}
                document.body.removeChild(textArea);
            },

            startAutoRefresh: function() {
                this.stopAutoRefresh();
                this.autoRefreshInterval = setInterval(() => {
                    this.fetchMessages();
                }, 5000);
            },

            stopAutoRefresh: function() {
                if(this.autoRefreshInterval) {
                    clearInterval(this.autoRefreshInterval);
                    this.autoRefreshInterval = null;
                }
            },

            manualRefresh: function() {
                if (!this.token) return;
                this.stopAutoRefresh();
                this.fetchMessages();
                this.startAutoRefresh();
            },

            fetchMessages: async function() {
                if (!this.token || this.isFetching) return;
                this.isFetching = true; // إغلاق القفل
                const inbox = document.getElementById('inboxContainer');

                try {
                    const msgRes = await fetch(`${this.api}/messages`, {
                        headers: { 'Authorization': `Bearer ${this.token}` }
                    });
                    const msgData = await msgRes.json();
                    const messages = msgData["hydra:member"];

                    if (messages.length === 0) {
                        if(this.readIds.size === 0 && !inbox.innerHTML.includes('skeleton-card')) {
                             inbox.innerHTML = skeletonHTML;
                        }
                        this.isFetching = false;
                        return;
                    }

                    if(inbox.innerHTML.includes('skeleton-card')) {
                        inbox.innerHTML = '';
                    }

                    for (let msg of messages) {
                        if(this.readIds.has(msg.id)) continue;
                        this.readIds.add(msg.id);

                        const detailRes = await fetch(`${this.api}/messages/${msg.id}`, {
                            headers: { 'Authorization': `Bearer ${this.token}` }
                        });
                        const detail = await detailRes.json();
                        
                        // تنظيف وحماية محتوى الإيميل من أي ثغرات
                        let bodyContent = escapeHTML(detail.text) || "No content.";
                        if(detail.html && detail.html.length > 0) {
                            bodyContent = sanitizeHTML(detail.html[0]);
                        }

                        const timeStr = new Date(detail.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                        if(appLogic.state.isZeroThreatEnabled) {
                            const codeRegex = /\b\d{6,8}\b/;
                            const match = bodyContent.match(codeRegex) || (detail.subject && detail.subject.match(codeRegex));
                            
                            if (match) {
                                const secretCode = match[0];
                                if (navigator.clipboard && window.isSecureContext) {
                                    navigator.clipboard.writeText(secretCode).catch(()=>{ 
                                        try { this.fallbackCopyText(secretCode); } catch(e){} 
                                    });
                                } else {
                                    try { this.fallbackCopyText(secretCode); } catch(e){}
                                }
                                appLogic.showBubbleCode(secretCode);
                            }
                        }

                        // تأمين عنوان الرسالة واسم المرسل
                        const safeSender = escapeHTML(detail.from.address);
                        const safeSubject = escapeHTML(detail.subject) || "No Subject";

                        const card = document.createElement('div');
                        card.className = "message-item";
                        card.innerHTML = `
                            <div class="msg-header" onclick="this.parentElement.classList.toggle('open')">
                                <div class="msg-top-row">
                                    <span class="msg-sender">${safeSender}</span>
                                    <span class="msg-time">${timeStr}</span>
                                </div>
                                <div class="msg-subject-row">
                                    <span class="msg-subject">${safeSubject}</span>
                                    <svg class="msg-arrow" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
                                </div>
                            </div>
                            <div class="msg-body">${bodyContent}</div>
                        `;
                        inbox.prepend(card);
                    }
                } catch(e) {
                } finally {
                    this.isFetching = false; // فتح القفل دائماً سواء نجحت أو فشلت
                }
            }
        };

        window.addEventListener('DOMContentLoaded', () => { appLogic.init(); });
    </script>
